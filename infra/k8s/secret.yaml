# Local/staging only — inject secrets via CI or sealed-secrets in production.
# For production, use external-secret.yaml with External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: amrutam-backend-secrets
  namespace: amrutam
  labels:
    app.kubernetes.io/name: amrutam-backend
type: Opaque
stringData:
  DATABASE_URL: postgresql://amrutam:amrutam_secret@postgres.amrutam.svc.cluster.local:5432/amrutam?schema=public
  JWT_ACCESS_SECRET: local-dev-access-secret-minimum-32-characters
  JWT_REFRESH_SECRET: local-dev-refresh-secret-minimum-32-characters
  PAYMENT_WEBHOOK_SECRET: local-dev-webhook-secret-minimum-32-characters
  REDIS_PASSWORD: ""
