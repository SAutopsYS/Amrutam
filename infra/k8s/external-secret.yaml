# Production secret management via External Secrets Operator.
# Syncs credentials from your cloud secret manager into a Kubernetes Secret.
# See: https://external-secrets.io/
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: amrutam-backend-secrets
  namespace: amrutam
  labels:
    app.kubernetes.io/name: amrutam-backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: amrutam-secret-store
    kind: ClusterSecretStore
  target:
    name: amrutam-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: amrutam/production/database-url
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: amrutam/production/jwt-access-secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: amrutam/production/jwt-refresh-secret
    - secretKey: MFA_ENCRYPTION_KEY
      remoteRef:
        key: amrutam/production/mfa-encryption-key
    - secretKey: PAYMENT_WEBHOOK_SECRET
      remoteRef:
        key: amrutam/production/payment-webhook-secret
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: amrutam/production/redis-password
