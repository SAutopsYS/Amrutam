apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amrutam-backend
  namespace: amrutam
  labels:
    app.kubernetes.io/name: amrutam-backend
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.amrutam.example
      secretName: amrutam-backend-tls
  rules:
    - host: api.amrutam.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amrutam-backend
                port:
                  number: 80
