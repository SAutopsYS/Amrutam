apiVersion: v1
kind: ConfigMap
metadata:
  name: amrutam-backend-config
  namespace: amrutam
  labels:
    app.kubernetes.io/name: amrutam-backend
data:
  NODE_ENV: production
  PORT: "3000"
  API_PREFIX: api/v1
  SERVICE_NAME: amrutam-backend
  APP_VERSION: "1.0.0"
  REDIS_HOST: redis.amrutam.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  BCRYPT_ROUNDS: "12"
  PASSWORD_HISTORY_COUNT: "5"
  THROTTLE_TTL: "60000"
  THROTTLE_LIMIT: "200"
  CORS_ORIGINS: https://app.amrutam.example
  SWAGGER_ENABLED: "false"
  MFA_ENABLED: "true"
  BOOKING_CANCELLATION_HOURS: "24"
  PAYMENT_PROVIDER: MOCK
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces
  METRICS_ENABLED: "true"
  SLOW_REQUEST_THRESHOLD_MS: "1000"
  SLOW_QUERY_THRESHOLD_MS: "500"
  MAX_HEAP_USED_MB: "512"
  CACHE_DEFAULT_TTL_SECONDS: "60"
  CACHE_LOCK_TTL_SECONDS: "10"
