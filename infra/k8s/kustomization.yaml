apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amrutam

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

images:
  - name: amrutam-backend
    newName: ghcr.io/amrutam/amrutam-backend
    newTag: latest
