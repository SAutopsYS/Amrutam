            type: string
            format: date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              example:
                success: true
                data:
                  period: daily
                  appointments: []
                  revenue: []
