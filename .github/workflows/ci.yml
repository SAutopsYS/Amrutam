name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://amrutam:amrutam_secret@localhost:5432/amrutam_test?schema=public
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_DB: 0
  NODE_ENV: test
  PORT: 3000
  API_PREFIX: api/v1
  JWT_ACCESS_SECRET: test-access-secret-min-32-characters-long
  JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters-long
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  BCRYPT_ROUNDS: 4
  PASSWORD_HISTORY_COUNT: 5
  THROTTLE_TTL: 60000
  THROTTLE_LIMIT: 1000
  CORS_ORIGINS: http://localhost:3000
  SWAGGER_ENABLED: false
  MFA_ENABLED: false
  MFA_ENCRYPTION_KEY: test-mfa-encryption-key-min-32-characters-long
  BOOKING_CANCELLATION_HOURS: 24
  PAYMENT_WEBHOOK_SECRET: test-webhook-secret-min-32-characters-long
  SERVICE_NAME: amrutam-backend
  APP_VERSION: 1.0.0
  OTEL_ENABLED: false
  METRICS_ENABLED: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=text
      - name: Enforce coverage thresholds
        run: node scripts/check-coverage.js
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  integration-test:
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amrutam
          POSTGRES_PASSWORD: amrutam_secret
          POSTGRES_DB: amrutam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: amrutam-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
